<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#21262d" stroke-width="1" opacity="0.6">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Accent line at top -->
  <rect width="900" height="3" fill="url(#accent)" rx="0"/>

  <!-- Node dots (decorative graph) -->
  <circle cx="72" cy="100" r="5" fill="#58a6ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="120" cy="68" r="4" fill="#bc8cff" opacity="0.7"/>
  <circle cx="120" cy="132" r="4" fill="#bc8cff" opacity="0.7"/>
  <line x1="72" y1="100" x2="120" y2="68" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="72" y1="100" x2="120" y2="132" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Logo text -->
  <text x="155" y="118" font-family="'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="700" fill="url(#accent)" filter="url(#glow)">SynapseKit</text>

  <!-- Tagline -->
  <text x="156" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.5">Async-first Python framework for building LLM applications</text>

  <!-- Pill tags -->
  <rect x="156" y="158" width="42" height="18" rx="9" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="177" y="171" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">RAG</text>

  <rect x="206" y="158" width="55" height="18" rx="9" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="233" y="171" font-family="monospace" font-size="10" fill="#bc8cff" text-anchor="middle">Agents</text>

  <rect x="269" y="158" width="68" height="18" rx="9" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="303" y="171" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">Workflows</text>

  <rect x="345" y="158" width="67" height="18" rx="9" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="378" y="171" font-family="monospace" font-size="10" fill="#f78166" text-anchor="middle">Streaming</text>
</svg>
